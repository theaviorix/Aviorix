<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aviorix — Creative Video Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0c0c0c;
    --white: #fafaf8;
    --muted: #888780;
    --accent: #3d9e75;
    --border: rgba(0,0,0,0.08);
    --glass: rgba(250, 250, 248, 0.90);
    --reel-bg: #f2f2f2;
  }

  [data-theme="dark"] {
    --black: #fafaf8;
    --white: #0c0c0c;
    --muted: #a0a0a0;
    --border: rgba(255,255,255,0.1);
    --glass: rgba(12, 12, 12, 0.85);
    --reel-bg: #1a1a1a;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--black);
    transition: background 0.3s ease, color 0.3s ease;
    overflow-x: hidden;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    background: var(--glass); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 70px;
  }
  .nav-logo { font-family: 'DM Serif Display', serif; font-size: 26px; letter-spacing: -1px; cursor: pointer; }

  #heroReelWrapper {
    position: relative; width: 100%; height: 100vh;
    background: var(--reel-bg); display: flex;
    align-items: center; justify-content: center; overflow: hidden;
  }

  #reelContainer {
    position: relative; height: 85vh; aspect-ratio: 9 / 16;
    background: #000; z-index: 1000;
    transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    box-shadow: 0 50px 100px rgba(0,0,0,0.3);
    border-radius: 24px; overflow: hidden;
  }

  #reelVideo { width: 100%; height: 100%; object-fit: cover; }

  #reelContainer.floating {
    position: fixed; bottom: 30px; right: 30px; height: 350px; width: auto; z-index: 10001;
  }

  .reel-controls {
    position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 1002;
  }
  .reel-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(0,0,0,0.6); color: white; border: none;
    cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(5px); transition: 0.2s;
  }
  .reel-btn:hover { background: var(--black); }

  .hero-content {
    position: absolute; left: 5%; color: var(--black); z-index: 1001; transition: opacity 0.4s;
  }
  #reelContainer.floating ~ .hero-content { opacity: 0; pointer-events: none; }

  .hero-pfp { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 1px solid var(--border); }
  .hero-content h1 { font-family: 'DM Serif Display', serif; font-size: 70px; line-height: 0.9; margin-bottom: 15px; }

  .section { padding: 100px 5%; max-width: 1200px; margin: 0 auto; }
  .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 40px; display: block; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 40px; }
  .work-card { border-radius: 20px; overflow: hidden; background: var(--white); border: 1px solid var(--border); }
  .video-box { position: relative; padding-bottom: 56.25%; background: #000; }
  .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

  .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .contact-card { background: var(--white); padding: 40px; border-radius: 20px; border: 1px solid var(--border); }
  .contact-card h4 { font-size: 12px; text-transform: uppercase; color: var(--muted); margin-bottom: 15px; }
  .contact-card a, .contact-card p { font-size: 24px; color: var(--black); text-decoration: none; font-family: 'DM Serif Display', serif; }

  footer { text-align: center; padding: 60px 0; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); }
</style>
</head>
<body data-theme="light">

<nav>
  <div class="nav-logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">Aviorix</div>
  <div style="display: flex; gap: 20px; align-items: center;">
    <div style="cursor:pointer; font-size: 12px; font-weight: 500;" id="themeToggle">DARK MODE</div>
  </div>
</nav>

<div id="heroReelWrapper">
  <div class="hero-content">
    <img src="52ec7715382f0f817f930daea83bb8a0.jpg" alt="Parth Aviorix" class="hero-pfp">
    <h1>Parth<br><span>Aviorix</span></h1>
    <p>Professional video editor specializing in dynamic gaming and finance content.</p>
  </div>

  <div id="reelContainer">
    <div class="reel-controls">
      <button class="reel-btn" id="muteBtn" onclick="toggleMute()">🔇</button>
      <button class="reel-btn" id="restoreBtn" style="display:none;" onclick="restoreReel()" title="Restore to Top">↗</button>
    </div>
    <video id="reelVideo" loop playsinline autoplay muted>
      <source src="ReelZoomed1.mp4" type="video/mp4">
    </video>
  </div>
</div>

<section class="section" id="works">
  <span class="label">Featured Works</span>
  <div class="grid">
    <div class="work-card">
      <div class="video-box">
        <iframe src="https://www.youtube.com/embed/F4NLi1nAK28?enablejsapi=1&rel=0&modestbranding=1"></iframe>
      </div>
      <div style="padding: 24px;"><h3>I Mastered Ryu</h3></div>
    </div>
    <div class="work-card">
      <div class="video-box">
        <iframe src="https://www.youtube.com/embed/0dLAyNhWDvk?enablejsapi=1&rel=0&modestbranding=1"></iframe>
      </div>
      <div style="padding: 24px;"><h3>Middle Class Trap</h3></div>
    </div>
  </div>
</section>

<section class="section" id="contact">
  <span class="label">Get in Touch</span>
  <div class="contact-grid">
    <div class="contact-card">
      <h4>Email</h4>
      <a href="mailto:theaviorix@gmail.com">theaviorix@gmail.com</a>
    </div>
    <div class="contact-card">
      <h4>WhatsApp</h4>
      <p>+91 7850024974</p>
    </div>
  </div>
</section>

<footer>&copy; 2026 Aviorix Portfolio.</footer>

<script>
  const video = document.getElementById('reelVideo');
  const reelContainer = document.getElementById('reelContainer');
  const muteBtn = document.getElementById('muteBtn');
  const restoreBtn = document.getElementById('restoreBtn');

  function toggleMute() {
    video.muted = !video.muted;
    muteBtn.textContent = video.muted ? '🔇' : '🔊';
  }

  window.addEventListener('scroll', () => {
    if (window.scrollY > 150) {
      reelContainer.classList.add('floating');
      restoreBtn.style.display = 'flex';
    } else {
      reelContainer.classList.remove('floating');
      restoreBtn.style.display = 'none';
    }
  });

  function restoreReel() {
    window.scrollTo({
      top: 0,
      behavior: 'smooth'
    });
  }

  document.getElementById('themeToggle').addEventListener('click', function() {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    this.textContent = isDark ? 'DARK MODE' : 'LIGHT MODE';
  });

  // Ensure autoplay works (must be muted)
  window.addEventListener('load', () => {
    video.play().catch(error => {
      console.log("Autoplay prevented by browser. User interaction needed to play sound.");
    });
  });
</script>

</body>
</html>
